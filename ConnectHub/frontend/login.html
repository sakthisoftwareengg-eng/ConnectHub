<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – ConnectHub</title>
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Theme Switcher Script -->
    <script src="/js/theme.js"></script>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="2" width="20" height="20" rx="4" stroke-width="2"></rect>
                <path d="M12 7v10M7 12h10" stroke-width="2"></path>
            </svg>
            ConnectHub
        </a>
        <div class="nav-actions">
            <div class="network-widget" id="network-status-widget">
                <span class="network-dot"></span>
                <span class="network-text">Loading...</span>
            </div>
            <button class="theme-btn" id="navbar-theme-btn"></button>
        </div>
    </nav>

    <!-- Page Wrapper -->
    <div class="app-container auth-wrapper">
        <div class="glass-card auth-card">
            
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Access your emergency console</p>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username or Email</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username or email" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/register">Create Account</a>
            </div>

        </div>
    </div>

    <!-- Core App JS Scripts -->
    <script src="/js/app.js"></script>
    
    <!-- Login Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                
                if (!isApplicationOnline) {
                    showToast('Offline Mode', 'Authentication is unavailable while offline.', 'error');
                    return;
                }
                
                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showToast('Login Successful', 'Welcome to ConnectHub.', 'success');
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 800);
                    } else {
                        showToast('Authentication Failed', data.error || 'Invalid credentials.', 'error');
                    }
                } catch (err) {
                    showToast('Connection Error', 'Could not reach login server.', 'error');
                }
            });
        });
    </script>
</body>
</html>
