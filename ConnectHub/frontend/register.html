<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – ConnectHub</title>
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Theme Switcher Script -->
    <script src="/js/theme.js"></script>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="2" width="20" height="20" rx="4" stroke-width="2"></rect>
                <path d="M12 7v10M7 12h10" stroke-width="2"></path>
            </svg>
            ConnectHub
        </a>
        <div class="nav-actions">
            <div class="network-widget" id="network-status-widget">
                <span class="network-dot"></span>
                <span class="network-text">Loading...</span>
            </div>
            <button class="theme-btn" id="navbar-theme-btn"></button>
        </div>
    </nav>

    <!-- Page Wrapper -->
    <div class="app-container auth-wrapper">
        <div class="glass-card auth-card">
            
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register to sync and broadcast SOS alerts</p>
            </div>

            <!-- Registration Form -->
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username" class="form-label">Username</label>
                    <input type="text" id="reg-username" class="form-control" placeholder="Choose a username" required minlength="3" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="reg-email" class="form-label">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="Enter your email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="reg-password" class="form-label">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Create secure password" required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Register</button>
            </form>

            <div class="auth-footer">
                Already registered? <a href="/login">Sign In</a>
            </div>

        </div>
    </div>

    <!-- Core App JS Scripts -->
    <script src="/js/app.js"></script>
    
    <!-- Registration Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('register-form');
            
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('reg-username').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const password = document.getElementById('reg-password').value;
                
                if (!isApplicationOnline) {
                    showToast('Offline Mode', 'Registration is unavailable while offline.', 'error');
                    return;
                }
                
                try {
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showToast('Account Created', 'Registration successful. Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 800);
                    } else {
                        showToast('Registration Failed', data.error || 'Failed to register.', 'error');
                    }
                } catch (err) {
                    showToast('Connection Error', 'Could not reach registration server.', 'error');
                }
            });
        });
    </script>
</body>
</html>
